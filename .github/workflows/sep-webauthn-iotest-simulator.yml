# SPDX-License-Identifier: AGPL-3.0-or-later
#
# SEP-WebAuthn IoTest — iOS Simulator smoke test for the WKWebView
# scaffolding + headless ID fixture check. Boots a simulator, builds +
# installs + launches the iotest app, captures the unified log, and asserts
# the expected probe markers.
#
# What this proves (CI-able, no device required):
#   - the iotest app builds for iOS Simulator
#   - WKWebView loads https://teleport.pcad.it/web/login
#   - window.PublicKeyCredential is exposed in the webview JS context
#   - isUserVerifyingPlatformAuthenticatorAvailable() returns a value
#   - evaluateJavaScript round-trips a value back to Swift
#   - HeadlessID.compute() matches the Go-generated fixture (session 1.9)
#
# What this does NOT prove (device-only):
#   - the Face ID prompt appears on the WebAuthn ceremony
#   - passwordless login completes against teleport.pcad.it
#   - the blocking POST /webapi/headless/login survives iOS backgrounding
#   - SEP-key creation with .biometryAny (simulator has no Secure Enclave)
#
# See:
#   spikes/sep-webauthn-iotest/README.md
#   spikes/sep-webauthn-iotest/scripts/simulator-smoke.sh
#   personal/github/cad0p/Goldmine/open-source/github/vvterm/
#     2026-07-22-strategy-b-session1.9-headless-bootstrap-device-de-risk-prompt.md

name: SEP-WebAuthn IoTest (simulator)

on:
  workflow_dispatch:
    inputs:
      sim_name:
        description: "Simulator device name"
        required: false
        default: "iPhone 15"
        type: string
  pull_request:
    paths:
      - 'spikes/sep-webauthn-iotest/**'
      - 'spikes/sep-webauthn/Sources/SEPWebAuthn/SSHPubKey.swift'
      - '.github/workflows/sep-webauthn-iotest-simulator.yml'

permissions:
  contents: read

jobs:
  simulator-smoke:
    runs-on: macos-14
    timeout-minutes: 25
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show tool versions
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | head -20
          xcrun simctl list devices available | grep -E "iPhone (15|16)" | head -5

      - name: Run simulator smoke test
        env:
          SIM_NAME: ${{ inputs.sim_name || 'iPhone 15' }}
        working-directory: spikes/sep-webauthn-iotest
        run: |
          set -euo pipefail
          ./scripts/simulator-smoke.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iotest-simulator-logs
          path: |
            spikes/sep-webauthn-iotest/**/*.log
          if-no-files-found: ignore
