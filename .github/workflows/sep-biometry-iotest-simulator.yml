#
# SEP biometry IoTest — iOS Simulator build check for the 1.6b Option A app.
#
# This does NOT (and cannot) run the SEP+biometry flow — that needs a real
# iPhone with Face ID. What it DOES prove:
#   - the hand-written sepbiometry.xcodeproj compiles
#   - the SEPWebAuthn library sources (added via relative-path group) build
#     for the iOS Simulator target
#   - the SEPBiometryTestRunner async port + the Curve25519 ssh-keygen
#     replacement compile
#   - the pbxproj relative-path reference to ../sep-webauthn/Sources/SEPWebAuthn
#     resolves in CI
#
# Catching a build bug here costs ~3min of CI; catching it on-device costs a
# full Xcode-install-to-iPhone round trip + my attention. Same rationale as
# the 1.6a scaffolding workflow (sep-webauthn-iotest-simulator.yml).
#
# See:
#   spikes/sep-biometry-iotest/README.md
#   .github/workflows/sep-webauthn-iotest-simulator.yml  (the 1.6a equivalent)

name: SEP biometry IoTest (simulator build)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'spikes/sep-biometry-iotest/**'
      - '.github/workflows/sep-biometry-iotest-simulator.yml'

permissions:
  contents: read

jobs:
  simulator-build:
    runs-on: macos-14
    timeout-minutes: 20
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Resolve a simulator
        run: |
          set -euo pipefail
          # Pick the first available iPhone 15 simulator (matches the 1.6a
          # workflow's choice). We only build, never install — the exact
          # device is unimportant, it just needs an iOS Simulator SDK.
          SIM_UDID="$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == 'iPhone 15' and d['isAvailable']:
                      print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")"
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "==> Using simulator: $SIM_UDID"

      - name: Build sepbiometry for iOS Simulator
        run: |
          set -euo pipefail
          xcodebuild \
            -project spikes/sep-biometry-iotest/sepbiometry.xcodeproj \
            -scheme sepbiometry \
            -configuration Debug \
            -destination "id=$SIM_UDID" \
            -destination-timeout 60 \
            -derivedDataPath "$RUNNER_TEMP/sepbiometry-dd" \
            build 2>&1 | tee "$RUNNER_TEMP/build.log"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sepbiometry-build-log
          path: |
            ${{ runner.temp }}/build.log
          if-no-files-found: ignore
