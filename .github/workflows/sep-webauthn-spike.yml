# SPDX-License-Identifier: AGPL-3.0-or-later
#
# SEP-WebAuthn spike — runs the Part A (software signer) and Part B (SEP
# signer) end-to-end tests against a Teleport proxy on a macos-14 runner.
#
# See:
#   spikes/sep-webauthn/README.md
#   personal/github/cad0p/Goldmine/open-source/github/vvterm/
#     2026-07-20-strategy-b-session1.5-sep-key-spike-prompt.md
#
# Secrets:
#   INVITE_TOKEN  — output of `tctl users add pier-vvterm-test` (single-use,
#                   ~1h TTL; mint a fresh one per run).

name: SEP-WebAuthn spike

on:
  workflow_dispatch:
    inputs:
      proxy_host:
        description: "Teleport proxy host"
        required: false
        default: "teleport.pcad.it"
        type: string
      run_part:
        description: "Which part to run"
        required: false
        default: "both"
        type: choice
        options:
          - a
          - b
          - both
      ttl:
        description: "Cert TTL (seconds)"
        required: false
        default: "3600"
        type: string

permissions:
  contents: read

jobs:
  spike:
    runs-on: macos-14
    timeout-minutes: 20
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          INVITE_TOKEN: ${{ secrets.INVITE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${INVITE_TOKEN:-}" ]]; then
            echo "Missing required secret: INVITE_TOKEN" >&2
            echo "Mint one with: tctl users add pier-vvterm-test" >&2
            exit 1
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install Go (for fixture generation)
        uses: actions/setup-go@v5
        with:
          # The fixture generator is self-contained (fxamacker/cbor + stdlib
          # only — the Teleport ECDSAPublicKeyFromRaw helper is inlined).
          go-version: '1.21'

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version
          go version

      - name: Build spike package
        working-directory: spikes/sep-webauthn
        run: |
          set -euo pipefail
          swift build

      - name: Regenerate fixtures
        working-directory: spikes/sep-webauthn
        run: |
          set -euo pipefail
          # The fixture generator is self-contained — it inlines the one
          # Teleport function it needed (ecdsaPublicKeyFromRaw, a 45-line
          # stdlib-only parser) so it doesn't pull the entire teleport module
          # (which requires Go >= 1.25.11 and has a complex nested api module).
          ./fixtures/regenerate.sh

      - name: Run fixture tests (byte-comparison vs Go output)
        working-directory: spikes/sep-webauthn
        run: |
          set -euo pipefail
          swift test

      - name: Part A — software signer end-to-end
        if: ${{ inputs.run_part == 'a' || inputs.run_part == 'both' }}
        working-directory: spikes/sep-webauthn
        env:
          INVITE_TOKEN: ${{ secrets.INVITE_TOKEN }}
        run: |
          set -euo pipefail
          .build/debug/sep-spike-cli \
            --token "$INVITE_TOKEN" \
            --host "${{ inputs.proxy_host }}" \
            --signer software \
            --ttl "${{ inputs.ttl }}"

      - name: Part B — Secure Enclave signer end-to-end
        if: ${{ inputs.run_part == 'b' || inputs.run_part == 'both' }}
        working-directory: spikes/sep-webauthn
        env:
          INVITE_TOKEN: ${{ secrets.INVITE_TOKEN }}
        run: |
          set -euo pipefail
          .build/debug/sep-spike-cli \
            --token "$INVITE_TOKEN" \
            --host "${{ inputs.proxy_host }}" \
            --signer sep \
            --ttl "${{ inputs.ttl }}"

      - name: Cleanup — remove the test MFA device
        if: ${{ always() }}
        env:
          INVITE_TOKEN: ${{ secrets.INVITE_TOKEN }}
        run: |
          # Best-effort cleanup. The device name is fixed in the CLI
          # (vvterm-sep-spike); if the spike registered one, the token
          # path can delete it via /webapi/mfa/token/:token/devices/:name.
          # This is a curl one-liner because we don't want to add a
          # cleanup mode to the Swift CLI.
          set +e
          curl -s -X DELETE \
            "https://${{ inputs.proxy_host }}/webapi/mfa/token/$INVITE_TOKEN/devices/vvterm-sep-spike" \
            -o /dev/null -w "cleanup: HTTP %{http_code}\n"
          exit 0
