# SPDX-License-Identifier: AGPL-3.0-or-later
#
# SEP-WebAuthn fixture tests — runs `swift test` on the SEPWebAuthn package
# WITHOUT an invite token. This is the byte-comparison regression guard for
# the CBOR / attestation / clientDataJSON / COSE key wire format.
#
# The full sep-webauthn-spike.yml workflow gates on INVITE_TOKEN (for the
# Part A/B end-to-end runs), so it can't be triggered on every PR. This
# workflow runs only the fixture tests, which need no token — they compare
# Swift output against committed Go-generated fixtures.
#
# Use this to verify wire-format-affecting refactors (CBOR.swift, Attestation.swift,
# SSHPubKey.swift, etc.) without spending an invite token.

name: SEP-WebAuthn fixture tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'spikes/sep-webauthn/**'
      - '.github/workflows/sep-webauthn-fixtures.yml'
      - 'spikes/sep-webauthn-iotest/iotest/HeadlessBootstrap/HeadlessID.swift'
  push:
    branches: [main]
    paths:
      - 'spikes/sep-webauthn/**'

permissions:
  contents: read

jobs:
  fixture-tests:
    runs-on: macos-14
    timeout-minutes: 15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install Go (for fixture generation)
        uses: actions/setup-go@v5
        with:
          # The fixture generator is self-contained — it inlines the one
          # Teleport function it needed (ecdsaPublicKeyFromRaw) so it doesn't
          # pull the entire teleport module (which requires Go >= 1.25.11
          # and has a complex nested api module).
          go-version: '1.21'

      - name: Build package
        working-directory: spikes/sep-webauthn
        run: swift build

      - name: Regenerate fixtures
        working-directory: spikes/sep-webauthn
        run: |
          set -euo pipefail
          # The fixture generator is self-contained — it inlines the one
          # Teleport function it needed (ecdsaPublicKeyFromRaw, a 45-line
          # stdlib-only parser) so it doesn't pull the entire teleport module.
          ./fixtures/regenerate.sh

      - name: Run fixture tests (byte-comparison vs Go output)
        working-directory: spikes/sep-webauthn
        run: swift test
